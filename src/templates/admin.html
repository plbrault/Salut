<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salut Admin</title>
    <script src="/static/tailwindcss.js"></script>
    <script src="/static/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/codemirror.min.css">
    <script src="/static/codemirror.min.js"></script>
    <script src="/static/yaml.min.js"></script>
    <style>
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 100 900;
            font-display: swap;
            src: url('/static/fonts/Inter-Variable.woff2') format('woff2');
        }
        :root {
            --bg: #f3f4f6;
            --card-bg: white;
            --text: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }
        [data-theme="dark"] {
            --bg: #111827;
            --card-bg: #1f2937;
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --border: #374151;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        .btn { padding: 0.5rem 1rem; border-radius: 0.375rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); }
        .btn:hover { opacity: 0.9; }
        .btn-primary { background: #2563eb; color: white; border-color: #2563eb; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger { background: #dc2626; color: white; border-color: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1.5rem; }
        .status-ok { color: #16a34a; }
        .status-error { color: #dc2626; }
        .log-entry { font-family: monospace; font-size: 0.8rem; padding: 0.25rem 0; border-bottom: 1px solid var(--border); }
        .CodeMirror { height: 400px; border: 1px solid var(--border); border-radius: 0.375rem; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .spinner { display: none; width: 1rem; height: 1rem; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-left: 0.5rem; vertical-align: middle; }
        .htmx-request .spinner { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Salut Admin</h1>
        <div id="content">
            {% if show_login %}
            <div class="card max-w-sm">
                <form onsubmit="loginWithJson(); return false;">
                <div class="mb-4">
                    <label for="password" class="block text-sm font-medium mb-1">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-3 py-2 border rounded-md" style="border-color: var(--border); background: var(--card-bg); color: var(--text);">
                </div>
                {% if error %}
                <p class="text-sm mb-4" style="color: #dc2626;">{{ error }}</p>
                {% endif %}
                <button type="submit" class="btn btn-primary">Log in</button>
                </form>
                <script>
                function loginWithJson() {
                    var pw = document.getElementById("password").value;
                    fetch("/admin/login", {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({password: pw})
                    }).then(function(r) {
                        if (r.redirected) {
                            window.location.href = r.url;
                        } else {
                            return r.text();
                        }
                    }).then(function(html) {
                        if (html) {
                            document.getElementById("content").innerHTML = html;
                        }
                    });
                }
                </script>
            </div>
            {% else %}
            <div class="card mb-6">
                <h2 class="text-lg font-semibold mb-4">Actions</h2>
                <div class="flex flex-wrap gap-2">
                    {% if config_exists %}
                    <button hx-get="/admin/config" hx-target="#editor" hx-swap="none" onclick="loadConfig()" class="btn">Load Config</button>
                    <button hx-post="/admin/validate" hx-target="#status" hx-vals="js:{content: editor.getValue()}" class="btn">Validate Config<span class="spinner"></span></button>
                    <button hx-put="/admin/config" hx-target="#status" hx-vals="js:{content: editor.getValue()}" class="btn btn-primary">Save & Reload<span class="spinner"></span></button>
                    {% endif %}
                    <button hx-post="/admin/reload" hx-target="#status" class="btn">Reload Config<span class="spinner"></span></button>
                    <button onclick="tryRestart()" class="btn btn-danger">Restart</button>
                    <button onclick="tryUpdate()" class="btn btn-danger">Update & Reload</button>
                </div>
                <div id="status" class="mt-3 text-sm"></div>
            </div>
            <div class="card mb-6">
                <h2 class="text-lg font-semibold mb-4">Config Editor</h2>
                {% if config_exists %}
                <textarea id="editor-source">{{ config_content }}</textarea>
                <div id="editor"></div>
                {% else %}
                <p class="text-sm" style="color: var(--text-secondary);">No <code>config.yml</code> found. Create one based on <code>starter.yml</code> to get started.</p>
                {% endif %}
            </div>
            <div class="card">
                <h2 class="text-lg font-semibold mb-4">Logs</h2>
                <button hx-get="/admin/logs" hx-target="#log-output" class="btn mb-3">Fetch Logs</button>
                <div id="log-output" class="max-h-64 overflow-y-auto"></div>
            </div>
            <div class="mt-6">
                <form method="post" action="/admin/logout"><button type="submit" class="btn">Log out</button></form>
            </div>
            {% endif %}
        </div>
    </div>
    <script>
        var theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;

        var editor;
        document.addEventListener('DOMContentLoaded', function() {
            var source = document.getElementById('editor-source');
            if (source) {
                editor = CodeMirror(document.getElementById('editor'), {
                    value: source.value,
                    mode: 'yaml',
                    lineNumbers: true,
                    theme: theme === 'dark' ? 'material-darker' : 'default'
                });
                source.style.display = 'none';
            }

            document.body.addEventListener('htmx:beforeRequest', function(e) {
                var elt = e.detail.elt;
                elt.disabled = true;
                document.getElementById('status').innerHTML = '';
            });

            document.body.addEventListener('htmx:afterRequest', function(e) {
                var elt = e.detail.elt;
                elt.disabled = false;
            });
        });

        function loadConfig() {
            var btn = document.querySelector('button[onclick="loadConfig()"]');
            btn.disabled = true;
            var spinner = btn.querySelector('.spinner');
            if (spinner) spinner.style.display = 'inline-block';
            document.getElementById('status').innerHTML = '';
            fetch('/admin/config').then(function(r) {
                if (!r.ok) throw new Error('Failed to load config');
                return r.json();
            }).then(function(data) {
                if (editor) {
                    editor.setValue(data.content || '');
                }
                document.getElementById('status').innerHTML = '<span style="color:#16a34a;">Config loaded successfully</span>';
            }).catch(function(e) {
                document.getElementById('status').innerHTML = '<span style="color:#dc2626;">' + e.message + '</span>';
            }).finally(function() {
                btn.disabled = false;
                if (spinner) spinner.style.display = 'none';
            });
        }

        function showRestartModal() {
            var overlay = document.createElement('div');
            overlay.id = 'restart-overlay';
            overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:9999;';
            overlay.innerHTML = '<div style="color:white;text-align:center;max-width:24rem;">' +
                '<p style="font-size:1.25rem;font-weight:bold;margin-bottom:1rem;">Server is restarting</p>' +
                '<p style="margin-bottom:1.5rem;">The application will be unavailable until the server has fully restarted.</p>' +
                '<button onclick="window.location.href=\'/\'" class="btn btn-primary">OK</button>' +
                '</div>';
            document.body.appendChild(overlay);
        }

        function tryRestart() {
            fetch('/admin/restart', {method: 'POST'}).then(function() {
                showRestartModal();
            }).catch(function() {
                showRestartModal();
            });
        }

        function tryUpdate() {
            fetch('/admin/update', {method: 'POST'}).then(function(r) {
                return r.json().then(function(data) {
                    if (r.ok) {
                        showRestartModal();
                    } else {
                        document.getElementById('status').textContent = data.error || 'Update failed';
                    }
                });
            }).catch(function() {
                showRestartModal();
            });
        }
    </script>
</body>
</html>
