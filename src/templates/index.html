<!DOCTYPE html>
<html lang="{{ language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <script src="/static/tailwindcss.js"></script>
    <script src="/static/htmx.min.js"></script>
    <style>
        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        header h1 {
            font-size: 2.5rem;
            font-weight: bold;
        }
        header span {
            font-size: 1.125rem;
            font-weight: 500;
            color: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <header>
        {{ page_header | safe }}
    </header>
    <script>
        (function() {
            var lang = document.documentElement.lang;
            var now = new Date();

            // Time emoji
            var hour = now.getHours();
            var emoji;
            if (hour >= 6 && hour < 12) emoji = '\u2600\uFE0F';
            else if (hour >= 12 && hour < 18) emoji = '\uD83C\uDF24\uFE0F';
            else if (hour >= 18 && hour < 22) emoji = '\uD83C\uDF19';
            else emoji = '\uD83C\uDF11';

            // Localized date
            var date = new Intl.DateTimeFormat(lang, {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: '2-digit'
            }).format(now);

            document.body.innerHTML = document.body.innerHTML
                .replace(/\{\{time_emoji\}\}/g, emoji)
                .replace(/\{\{date\}\}/g, date);
        })();
    </script>
    {% if dev_mode %}
    <script>
        (function() {
            var lastVersion = null;
            setInterval(function() {
                fetch('/dev-reload').then(function(r) {
                    return r.json();
                }).then(function(data) {
                    if (lastVersion !== null && data.version !== lastVersion) {
                        location.reload();
                    }
                    lastVersion = data.version;
                }).catch(function() {
                    location.reload();
                });
            }, 1000);
        })();
    </script>
    {% endif %}
    <main class="grid gap-6 mt-8" style="grid-template-columns: repeat({{ num_cols }}, 1fr);">
        {% for card in cards %}
        <div class="bg-white rounded-lg border border-gray-200 p-4 mb-4" style="grid-column: {{ card.col }} / span {{ card.colspan }}; grid-row: {{ card.row }}; align-self: start;">
            <h3 class="text-lg font-semibold mb-2">{{ card.title }}</h3>
            {{ card.content | safe }}
        </div>
        {% endfor %}
    </main>
</body>
</html>
