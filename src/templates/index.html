<!DOCTYPE html>
<html lang="{{ language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    {% if favicon %}<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>{{ favicon }}</text></svg>">{% endif %}
    <script src="/static/tailwindcss.js"></script>
    <script src="/static/htmx.min.js"></script>
    <script>
        (function() {
            var stored = localStorage.getItem('theme');
            var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.dataset.theme = theme;

            window.toggleTheme = function() {
                var current = document.documentElement.dataset.theme;
                var next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.dataset.theme = next;
                localStorage.setItem('theme', next);
                var btn = document.querySelector('.theme-toggle');
                if (btn) btn.innerHTML = next === 'dark' ? window.themeIcons.moon : window.themeIcons.sun;
            };

            window.themeIcons = {
                sun: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>',
                moon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
            };
        })();
    </script>
    <style>
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 100 900;
            font-display: swap;
            src: url('/static/fonts/Inter-Variable.woff2') format('woff2');
        }
        :root {
            --bg: #f3f4f6;
            --card-bg: white;
            --text: #111827;
            --text-muted: #6b7280;
            --text-faint: #9ca3af;
            --border: #e5e7eb;
            --link: #2563eb;
            --link-hover: #1d4ed8;
            --code-bg: #f3f4f6;
        }
        [data-theme="dark"] {
            --bg: #111827;
            --card-bg: #1f2937;
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --text-faint: #6b7280;
            --border: #374151;
            --link: #60a5fa;
            --link-hover: #93bbfd;
            --code-bg: #283548;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        header h1 {
            font-family: 'Inter', sans-serif;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--text);
        }
        header span {
            font-size: 1.125rem;
            font-weight: 500;
            color: var(--text-muted);
        }
        #container {
            position: relative;
            margin-top: 2rem;
        }
        .card {
            position: absolute;
            background: var(--card-bg);
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            padding: 1rem;
            box-sizing: border-box;
            color: var(--text);
        }
        .card h3 {
            font-family: 'Inter', sans-serif;
            color: var(--text);
        }
        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: background-color 0.2s;
        }
        .theme-toggle:hover {
            background-color: var(--border);
        }
    </style>
    {% if plugin_style_rules %}
    <style>
        {{ plugin_style_rules }}
    </style>
    {% endif %}
</head>
<body class="p-8" style="background: var(--bg); font-family: 'Inter', sans-serif;">
    <header>
        {{ page_header | safe }}
    </header>
    {% if dev_mode %}
    <script>
        (function() {
            var lastVersion = null;
            setInterval(function() {
                fetch('/dev-reload').then(function(r) {
                    return r.json();
                }).then(function(data) {
                    if (lastVersion !== null && data.version !== lastVersion) {
                        location.reload();
                    }
                    lastVersion = data.version;
                }).catch(function() {
                    location.reload();
                });
            }, 1000);
        })();
    </script>
    {% endif %}
    <div id="container">
        {% for card in cards %}
        <div class="card {{ card.css_class }}" data-colspan="{{ card.colspan }}">
            <h3 class="text-lg font-semibold mb-2">{{ card.title }}</h3>
            {{ card.content | safe }}
        </div>
        {% endfor %}
    </div>
    <script>
        (function() {
            var lang = document.documentElement.lang;
            var now = new Date();

            // Time emoji
            var hour = now.getHours();
            var emoji;
            if (hour >= 6 && hour < 12) emoji = '\u2600\uFE0F';
            else if (hour >= 12 && hour < 18) emoji = '\uD83C\uDF24\uFE0F';
            else if (hour >= 18 && hour < 22) emoji = '\uD83C\uDF19';
            else emoji = '\uD83C\uDF11';

            // Localized date
            var date = new Intl.DateTimeFormat(lang, {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: '2-digit'
            }).format(now);

            // Theme toggle button
            var theme = document.documentElement.dataset.theme || 'light';
            var toggleHtml = '<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">'
                + (theme === 'dark' ? window.themeIcons.moon : window.themeIcons.sun)
                + '</button>';

            document.body.innerHTML = document.body.innerHTML
                .replace(/\{\{time_emoji\}\}/g, emoji)
                .replace(/\{\{date\}\}/g, date)
                .replace(/\{\{theme_toggle\}\}/g, toggleHtml);
        })();
    </script>
    <script>
        (function() {
            var MAX_COLS = {{ max_cols }};
            var GAP = 24;
            var container = document.getElementById('container');
            var cards = Array.from(container.querySelectorAll('.card'));

            function getNumCols() {
                var w = window.innerWidth;
                if (w < 640) return 1;
                if (w < 1024) return Math.min(2, MAX_COLS);
                return MAX_COLS;
            }

            function layout() {
                var numCols = getNumCols();
                var containerWidth = container.offsetWidth;
                var colWidth = (containerWidth - (numCols - 1) * GAP) / numCols;

                // Track height of each column
                var colHeights = [];
                for (var i = 0; i < numCols; i++) colHeights.push(0);

                // Greedy column packing
                var maxY = 0;
                cards.forEach(function(card) {
                    var colspan = parseInt(card.getAttribute('data-colspan')) || 1;
                    if (colspan > numCols) colspan = numCols;

                    // Find column span with minimum max height
                    var bestCol = 0;
                    var bestMaxH = Infinity;
                    for (var c = 0; c <= numCols - colspan; c++) {
                        var maxH = 0;
                        for (var k = c; k < c + colspan; k++) {
                            if (colHeights[k] > maxH) maxH = colHeights[k];
                        }
                        if (maxH < bestMaxH) {
                            bestMaxH = maxH;
                            bestCol = c;
                        }
                    }

                    // Calculate position
                    var x = bestCol * (colWidth + GAP);
                    var y = bestMaxH + (bestMaxH > 0 ? GAP : 0);
                    var width = colspan * colWidth + (colspan - 1) * GAP;

                    card.style.left = x + 'px';
                    card.style.top = y + 'px';
                    card.style.width = width + 'px';

                    // Update column heights
                    var newHeight = y + card.offsetHeight;
                    for (var k = bestCol; k < bestCol + colspan; k++) {
                        colHeights[k] = newHeight;
                    }
                    if (newHeight > maxY) maxY = newHeight;
                });

                container.style.height = maxY + 'px';
            }

            layout();
            var resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(layout, 100);
            });
        })();
    </script>
</body>
</html>
