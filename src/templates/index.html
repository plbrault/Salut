<!DOCTYPE html>
<html lang="{{ language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <script src="/static/tailwindcss.js"></script>
    <script src="/static/htmx.min.js"></script>
    <style>
        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        header h1 {
            font-size: 2.5rem;
            font-weight: bold;
        }
        header span {
            font-size: 1.125rem;
            font-weight: 500;
            color: #6b7280;
        }
        #container {
            position: relative;
            margin-top: 2rem;
        }
        .card {
            position: absolute;
            background: white;
            border-radius: 0.5rem;
            border: 1px solid #e5e7eb;
            padding: 1rem;
            box-sizing: border-box;
        }
    </style>
    {% if plugin_style_rules %}
    <style>
        {{ plugin_style_rules }}
    </style>
    {% endif %}
</head>
<body class="bg-gray-100 p-8">
    <header>
        {{ page_header | safe }}
    </header>
    <script>
        (function() {
            var lang = document.documentElement.lang;
            var now = new Date();

            // Time emoji
            var hour = now.getHours();
            var emoji;
            if (hour >= 6 && hour < 12) emoji = '\u2600\uFE0F';
            else if (hour >= 12 && hour < 18) emoji = '\uD83C\uDF24\uFE0F';
            else if (hour >= 18 && hour < 22) emoji = '\uD83C\uDF19';
            else emoji = '\uD83C\uDF11';

            // Localized date
            var date = new Intl.DateTimeFormat(lang, {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: '2-digit'
            }).format(now);

            document.body.innerHTML = document.body.innerHTML
                .replace(/\{\{time_emoji\}\}/g, emoji)
                .replace(/\{\{date\}\}/g, date);
        })();
    </script>
    {% if dev_mode %}
    <script>
        (function() {
            var lastVersion = null;
            setInterval(function() {
                fetch('/dev-reload').then(function(r) {
                    return r.json();
                }).then(function(data) {
                    if (lastVersion !== null && data.version !== lastVersion) {
                        location.reload();
                    }
                    lastVersion = data.version;
                }).catch(function() {
                    location.reload();
                });
            }, 1000);
        })();
    </script>
    {% endif %}
    <div id="container">
        {% for card in cards %}
        <div class="card {{ card.css_class }}" data-colspan="{{ card.colspan }}">
            <h3 class="text-lg font-semibold mb-2">{{ card.title }}</h3>
            {{ card.content | safe }}
        </div>
        {% endfor %}
    </div>
    <script>
        (function() {
            var MAX_COLS = {{ max_cols }};
            var GAP = 24;
            var container = document.getElementById('container');
            var cards = Array.from(container.querySelectorAll('.card'));

            function getNumCols() {
                var w = window.innerWidth;
                if (w < 640) return 1;
                if (w < 1024) return Math.min(2, MAX_COLS);
                return MAX_COLS;
            }

            function layout() {
                var numCols = getNumCols();
                var containerWidth = container.offsetWidth;
                var colWidth = (containerWidth - (numCols - 1) * GAP) / numCols;

                // Track height of each column
                var colHeights = [];
                for (var i = 0; i < numCols; i++) colHeights.push(0);

                // Greedy column packing
                var maxY = 0;
                cards.forEach(function(card) {
                    var colspan = parseInt(card.getAttribute('data-colspan')) || 1;
                    if (colspan > numCols) colspan = numCols;

                    // Find column span with minimum max height
                    var bestCol = 0;
                    var bestMaxH = Infinity;
                    for (var c = 0; c <= numCols - colspan; c++) {
                        var maxH = 0;
                        for (var k = c; k < c + colspan; k++) {
                            if (colHeights[k] > maxH) maxH = colHeights[k];
                        }
                        if (maxH < bestMaxH) {
                            bestMaxH = maxH;
                            bestCol = c;
                        }
                    }

                    // Calculate position
                    var x = bestCol * (colWidth + GAP);
                    var y = bestMaxH + (bestMaxH > 0 ? GAP : 0);
                    var width = colspan * colWidth + (colspan - 1) * GAP;

                    card.style.left = x + 'px';
                    card.style.top = y + 'px';
                    card.style.width = width + 'px';

                    // Update column heights
                    var newHeight = y + card.offsetHeight;
                    for (var k = bestCol; k < bestCol + colspan; k++) {
                        colHeights[k] = newHeight;
                    }
                    if (newHeight > maxY) maxY = newHeight;
                });

                container.style.height = maxY + 'px';
            }

            layout();
            var resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(layout, 100);
            });
        })();
    </script>
</body>
</html>
