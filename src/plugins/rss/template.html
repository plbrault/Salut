<div class="flex flex-col gap-2">
    {% for item in items %}
    <a href="{{ item.link }}" target="_blank" rel="noopener" class="flex items-start gap-3 rounded-lg border border-gray-200 p-3 transition-colors hover:bg-gray-50">
        {% if item.image_url %}
        <img src="{{ item.image_url }}" alt="" class="w-24 h-24 rounded-lg object-cover flex-shrink-0">
        {% endif %}
        <div class="flex flex-col gap-1 min-w-0">
            <span class="text-sm font-medium text-gray-900 leading-snug">{{ item.title }}</span>
            <span class="text-xs text-gray-500">{{ item.source }}</span>
        </div>
    </a>
    {% endfor %}
</div>
