<div class="flex flex-col gap-2">
    {% for item in items %}
    <a href="{{ item.link }}" target="_blank" rel="noopener" class="flex items-start gap-3 rounded-lg p-3 transition-colors" style="border: 1px solid var(--border); color: var(--text);">
        {% if item.image_url %}
        <img src="{{ item.image_url }}" alt="" class="w-24 h-24 rounded-lg object-cover flex-shrink-0">
        {% endif %}
        <div class="flex flex-col gap-1 min-w-0">
            <span class="text-sm font-medium leading-snug" style="color: var(--text)">{{ item.title }}</span>
            <span class="text-xs" style="color: var(--text-muted)">{{ item.source }}</span>
        </div>
    </a>
    {% endfor %}
</div>
