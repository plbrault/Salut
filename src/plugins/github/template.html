<div class="flex flex-col gap-2">
    {% for notif in notifications %}
    <a href="{{ notif.web_url }}" target="_blank" rel="noopener"
       class="flex items-start gap-3 rounded-lg p-3 transition-colors"
       style="border: 1px solid var(--border); color: var(--text);">
        <div class="flex flex-col gap-1 min-w-0">
            <span class="text-xs font-medium" style="color: var(--text-muted)">{{ notif.repo_name }}</span>
            <span class="text-sm font-medium leading-snug" style="color: var(--text)">{{ notif.subject_title }}</span>
            <span class="text-xs" style="color: var(--text-muted)">{{ notif.reason }} · {{ notif.time_ago }}</span>
        </div>
    </a>
    {% endfor %}
    {% if not notifications %}
    <div class="text-sm" style="color: var(--text-muted)">{{ no_notifications_label }}</div>
    {% endif %}
</div>
