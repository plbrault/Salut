<div class="calendar-events">
    {% for event in events %}
    <div class="calendar-event">
        <div class="calendar-date">
            {% if event.is_allday %}
                <div class="calendar-date-day">{{ event.start[:10] }}</div>
                <div class="calendar-date-time">All day</div>
            {% else %}
                <div class="calendar-date-day">{{ event.start[:10] }}</div>
                <div class="calendar-date-time">{{ event.start[11:16] }}</div>
            {% endif %}
        </div>
        <div class="calendar-summary">{{ event.summary }}</div>
    </div>
    {% endfor %}
</div>
