page_title: Salut 👋
page_header: "<h1>Hi ${user_info.short_name} {{time_emoji}}</h1><span>{{date}} {{theme_toggle}}</span>"
language: en
user_info:
  short_name: Chris
  long_name: Chris P. Bacon

columns: 3

cards:
  - title: Web Search
    plugin: search
    colspan: 2
    options:
      provider: duckduckgo
      button_text: "Search"
      placeholder_text: "Search on DuckDuckGo"
  - title: Welcome ${user_info.long_name} !
    plugin: html
    options:
      html: "<p>This is an example card. You can add any HTML content here.</p>"
  - title: World News
    plugin: rss
    options:
      feeds:
        - http://feeds.bbci.co.uk/news/world/rss.xml
        - https://rss.nytimes.com/services/xml/rss/nyt/World.xml
        - https://www.theguardian.com/world/rss
        - http://rss.cnn.com/rss/edition_world.rss
        - https://www.cbc.ca/webfeed/rss/rss-world
      schedule: "*/5 * * * *"
      max_items: 10
      images: true
  - title: Tech News
    plugin: rss
    options:
      feeds:
        - https://feeds.arstechnica.com/arstechnica/index
        - https://www.theverge.com/rss/index.xml
        - https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml
        - https://www.wired.com/feed/rss
      schedule: "*/5 * * * *"
      max_items: 10
      images: true
  - title: Links
    plugin: html
    options:
      html: "<ul><li><a href='https://github.com'>GitHub</a></li><li><a href='https://news.ycombinator.com'>Hacker News</a></li></ul>"
  - title: Tips
    plugin: html
    options:
      html: "<p>Edit config.yml to customize your page.</p>"
  - title: Wikipedia
    plugin: search
    options:
      provider: wikipedia
      language: en
      button_text: "Search Wikipedia"
  - title: Weather
    plugin: weather
    options:
      provider: open-meteo
      latitude: 45.50884
      longitude: -73.58781
      location_name: "Montréal (Québec)"
      schedule: "0 */2 * * *"
      link_url: "https://www.theweathernetwork.com/en/city/ca/quebec/montreal/current"
  - title: Calendar
    plugin: calendar
    options:
      calendars:
        - url: "https://caldav.calconnect.org/public/holidays/"
          auth_type: basic
      schedule: "*/30 * * * *"
      time_window_days: 30
      max_events: 10
