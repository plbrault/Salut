page_title: Salut 👋
page_header: "<h1>${i18n.hi} ${user_info.short_name} {{time_emoji}}</h1><span>{{date}} {{theme_toggle}}</span>"
language: en
user_info:
  short_name: Chris
  long_name: Chris P. Bacon

columns: 4

cards:
  - title: Welcome to your start page!
    colspan: 4
    plugin: html
    options:
      html: "Get started by coping <code>starter.yml</code> to <code>config.yml</code> and customizing it to your liking. Check out the <a target='_blank' href='https://github.com/plbrault/Salut/blob/main/docs/config.md'>documentation</a> for more information."
  - title: Web Search
    plugin: search
    colspan: 3
    options:
      provider: duckduckgo
      placeholder_text: "Search on DuckDuckGo"
  - title: Wikipedia
    plugin: search
    options:
      provider: wikipedia
      language: en
      placeholder_text: "Search on Wikipedia"
  - title: Weather
    plugin: weather
    options:
      provider: open-meteo
      latitude: 45.50884
      longitude: -73.58781
      location_name: "Montreal"
      schedule: "0 */2 * * *"
      link_url: "https://www.theweathernetwork.com/en/city/ca/quebec/montreal/current"
  - title: Tech News
    plugin: rss
    colspan: 2
    options:
      feeds:
        - https://hnrss.org/frontpage
        - https://feeds.arstechnica.com/arstechnica/technology-lab
        - https://feeds.arstechnica.com/arstechnica/gadgets
        - https://www.tomshardware.com/feeds.xml
        - https://rss.slashdot.org/Slashdot/slashdotMain
      schedule: "*/5 * * * *"
      max_items: 20
      images: true
  - title: Links
    plugin: html
    options:
      html: "<ul><li><a target='_blank' href='https://github.com'>GitHub</a></li><li><a target='_blank' href='https://news.ycombinator.com'>Hacker News</a></li><li><a target='_blank' href='https://www.reddit.com'>Reddit</a></li></ul>"
  - title: Random Cat
    plugin: html
    options:
      html: "<img src='https://cataas.com/cat?width=400' alt='Random cat' class='w-full rounded-lg' onload='window.dispatchEvent(new Event(\"resize\"))'>"
  - title: About
    plugin: html
    options:
      html: "<div class='flex flex-col gap-3'><p class='text-sm leading-relaxed' style='color: var(--text)'>This start page is powered by <a target='_blank' href='https://github.com/plbrault/Salut' style='color: var(--link)'>Salut</a>.</p><p class='text-xs leading-relaxed' style='color: var(--text-muted)'>Salut is developed by <a target='_blank' href='https://plbrault.com' style='color: var(--link)'>Pier-Luc Brault</a> and is published under the <a target='_blank' href='https://www.gnu.org/licenses/agpl-3.0.html' style='color: var(--link)'>AGPLv3 license</a></p></div>"
  - title: Upcoming Holidays
    plugin: calendar
    options:
      calendars:
        - url: "https://www.officeholidays.com/ics/canada"
          type: ics
          name: "Canadian Holidays"
          color: "#ef4444"
      schedule: "*/30 * * * *"
      time_window_days: 30
      max_events: 10
